<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Placement Preparation Agent</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SETUP SCREEN -->

    <section id="setupScreen" class="setup-screen">

        <div class="setup-card">

            <h1>🤖 AI Placement Agent</h1>

            <p>Let's create your preparation plan 🚀</p>

            <form id="setupForm">

                <input
                    type="text"
                    id="userName"
                    placeholder="Enter your name"
                    required
                >

                <select id="targetRole" required>

                    <option value="">
                        Select Target Role
                    </option>

                    <option value="Software Developer">
                        Software Developer
                    </option>

                    <option value="Python Developer">
                        Python Developer
                    </option>

                    <option value="Web Developer">
                        Web Developer
                    </option>

                    <option value="Data Analyst">
                        Data Analyst
                    </option>

                </select>

                <h3>Select Your Skills</h3>

                <div class="skills">

                    <label>
                        <input type="checkbox" value="Python">
                        Python
                    </label>

                    <label>
                        <input type="checkbox" value="SQL">
                        SQL
                    </label>

                    <label>
                        <input type="checkbox" value="HTML">
                        HTML
                    </label>

                    <label>
                        <input type="checkbox" value="CSS">
                        CSS
                    </label>

                    <label>
                        <input type="checkbox" value="JavaScript">
                        JavaScript
                    </label>

                </div>

                <button type="submit" class="primary-btn">
                    Start Preparation 🚀
                </button>

            </form>

        </div>

    </section>


    <!-- APP -->

    <section id="app" class="hidden">

        <header>

            <h1>🤖 AI Placement Preparation Agent</h1>

            <button onclick="resetUser()">
                Reset
            </button>

        </header>


        <!-- NAVIGATION -->

        <nav>

            <button onclick="showDashboard()">
                Dashboard
            </button>

            <button onclick="showProgress()">
                Progress
            </button>

        </nav>


        <!-- DASHBOARD -->

        <main id="dashboardSection">

            <h2 id="welcomeText"></h2>

            <div class="profile-card">

                <h3 id="profileName"></h3>

                <p id="role"></p>

            </div>


            <div class="agent-card">

                <h3>🤖 AI Coach</h3>

                <p id="agentMessage"></p>

            </div>


            <div class="stats">

                <div class="stat-card">

                    <h3 id="solved">0</h3>

                    <p>Questions Solved</p>

                </div>

                <div class="stat-card">

                    <h3 id="readiness">0%</h3>

                    <p>Readiness</p>

                </div>

            </div>


            <h2>📚 Practice</h2>

            <div class="practice-buttons">

                <button onclick="startPractice('aptitude')">
                    🧮 Aptitude
                </button>

                <button onclick="startPractice('technical')">
                    💻 Technical
                </button>

                <button onclick="startPractice('coding')">
                    🐍 Coding
                </button>

                <button onclick="startPractice('interview')">
                    🎤 Interview
                </button>

            </div>


            <h2>📊 Skill Analysis</h2>

            <div id="skillAnalysis"></div>


            <h2>🗺️ Roadmap</h2>

            <div id="roadmap"></div>


            <div id="continueCard"></div>


            <h2>🤖 AI Coach Chat</h2>

            <div id="chatMessages"></div>

            <div class="chat-box">

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Ask me something..."
                >

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </main>


        <!-- PRACTICE -->

        <main id="practiceSection" class="hidden">

            <h2 id="practiceTitle"></h2>

            <p id="questionNumber"></p>

            <div class="progress-container">

                <div id="questionProgress"></div>

            </div>

            <h2 id="questionText"></h2>

            <div id="answerArea"></div>

            <div id="feedback"></div>

            <button
                id="nextButton"
                class="primary-btn hidden"
                onclick="nextQuestion()"
            >
                Next Question →
            </button>

            <button
                class="back-btn"
                onclick="showDashboard()"
            >
                ← Dashboard
            </button>

        </main>


        <!-- PROGRESS -->

        <main id="progressSection" class="hidden">

            <h2>📊 Your Progress</h2>

            <div id="progressContent"></div>

            <button
                class="back-btn"
                onclick="showDashboard()"
            >
                ← Dashboard
            </button>

        </main>

    </section>


    <script src="script.js"></script>

</body>

    </html>
